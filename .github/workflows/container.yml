name: Container build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  container:
    name: ${{ matrix.container }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: pulpcore
            project: pulp
          - container: pulp-development
            project: pulp-development
            pulpcore_version: "3.105.1"
    steps:
      - uses: actions/checkout@v7
      - name: Pin pulpcore version
        if: matrix.pulpcore_version != ''
        run: sed -i "s/^pulpcore$/pulpcore==${{ matrix.pulpcore_version }}/" images/pulp-development/requirements.txt
      - name: Build ${{ matrix.container }} container
        run: PROJECT=${{ matrix.project }} make build
