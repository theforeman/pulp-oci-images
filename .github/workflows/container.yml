name: Container build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.ref_name }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  container:
    name: ${{ matrix.container }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - container: pulpcore
            project: pulp
            build_args: ""
          - container: pulp-development
            project: pulp-development
            build_args: ""
          - container: pulp-development (unsupported pulp_smart_proxy)
            project: pulp-development
            build_args: "PULP_SMART_PROXY_ALLOW_UNSUPPORTED_VERSIONS=true"
    steps:
      - uses: actions/checkout@v7
      - name: Build ${{ matrix.container }} container
        run: ${{ matrix.build_args }} PROJECT=${{ matrix.project }} make build
